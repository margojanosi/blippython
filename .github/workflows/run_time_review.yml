name: BrightHR Time Review

# Trigger 1: Power Automate sends a repository_dispatch event when a new CSV
#             appears in the designated SharePoint folder.  The CSV content is
#             base64-encoded inside the event payload — the file never touches
#             the repository.
#
# Trigger 2: Manually from the Actions tab — supports both the CSV path
#             (paste a filename from data/input/) and the BrightHR API path
#             (supply date-from / date-to to pull data directly).
#
# Trigger 3: Automatically on push — used for development / sample-data testing
#             only.  Real exports must go through SharePoint (Trigger 1) or the
#             API path (Trigger 2 with source=api).
on:
  repository_dispatch:
    types: [brighthr-csv-ready]

  workflow_dispatch:
    inputs:
      source:
        description: 'Data source: "csv" (default) uses a file in data/input/; "api" fetches directly from BrightHR'
        required: false
        default: 'csv'
        type: choice
        options:
          - csv
          - api
      input_file:
        description: '[csv only] CSV filename inside data/input/ (e.g. sample_bright_hr_export.csv)'
        required: false
        default: 'sample_bright_hr_export.csv'
      date_from:
        description: '[api only] Start date YYYY-MM-DD (inclusive)'
        required: false
        default: ''
      date_to:
        description: '[api only] End date YYYY-MM-DD (inclusive)'
        required: false
        default: ''

  push:
    branches: [main]
    paths:
      - 'data/input/sample_bright_hr_export.csv'

jobs:
  generate-workbook:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -e .

      # --- SharePoint path: CSV arrives as base64 in the dispatch payload ---
      - name: Decode CSV from SharePoint payload
        if: github.event_name == 'repository_dispatch'
        env:
          CSV_B64: ${{ github.event.client_payload.csv_content }}
        run: |
          if [ -z "$CSV_B64" ]; then
            echo "::error::repository_dispatch payload missing csv_content field."
            exit 1
          fi
          mkdir -p /tmp/brighthr_input
          if ! echo "$CSV_B64" | base64 -d > /tmp/brighthr_input/brighthr_export.csv 2>/dev/null; then
            echo "::error::Failed to decode csv_content — ensure the value is valid base64."
            exit 1
          fi
          if [ ! -s /tmp/brighthr_input/brighthr_export.csv ]; then
            echo "::error::Decoded CSV is empty — the SharePoint file may be empty or encoding failed."
            exit 1
          fi
          echo "RUN_SOURCE=csv" >> "$GITHUB_ENV"
          echo "INPUT=/tmp/brighthr_input/brighthr_export.csv" >> "$GITHUB_ENV"

      # --- Manual / push path: resolve CSV file or API date range ---
      - name: Resolve input for manual / push trigger
        if: github.event_name != 'repository_dispatch'
        run: |
          SOURCE="${{ inputs.source }}"
          SOURCE="${SOURCE:-csv}"   # default for push trigger

          if [ "$SOURCE" = "api" ]; then
            DATE_FROM="${{ inputs.date_from }}"
            DATE_TO="${{ inputs.date_to }}"
            if [ -z "$DATE_FROM" ] || [ -z "$DATE_TO" ]; then
              echo "::error::date_from and date_to are required when source=api."
              exit 1
            fi
            echo "RUN_SOURCE=api" >> "$GITHUB_ENV"
            echo "DATE_FROM=$DATE_FROM" >> "$GITHUB_ENV"
            echo "DATE_TO=$DATE_TO" >> "$GITHUB_ENV"
          else
            # CSV path
            if [ "${{ github.event_name }}" = "push" ]; then
              if [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
                CHANGED=$(git diff-tree --no-commit-id --name-only -r "${{ github.sha }}" \
                          -- 'data/input/' | grep '\.csv$' | head -n 1)
              else
                CHANGED=$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" \
                          -- 'data/input/' | grep '\.csv$' | head -n 1)
              fi
              echo "INPUT=${CHANGED:-data/input/sample_bright_hr_export.csv}" >> "$GITHUB_ENV"
            else
              echo "INPUT=data/input/${{ inputs.input_file }}" >> "$GITHUB_ENV"
            fi
            echo "RUN_SOURCE=csv" >> "$GITHUB_ENV"
          fi

      - name: Create output directory
        run: mkdir -p data/output

      # --- CSV run (SharePoint dispatch or manual/push CSV path) ---
      - name: Run BrightHR Time Review (CSV)
        if: env.RUN_SOURCE == 'csv'
        env:
          SHAREPOINT_TENANT_ID: ${{ secrets.SHAREPOINT_TENANT_ID }}
          SHAREPOINT_CLIENT_ID: ${{ secrets.SHAREPOINT_CLIENT_ID }}
          SHAREPOINT_CLIENT_SECRET: ${{ secrets.SHAREPOINT_CLIENT_SECRET }}
          SHAREPOINT_SITE_ID: ${{ secrets.SHAREPOINT_SITE_ID }}
          SHAREPOINT_DRIVE_ID: ${{ secrets.SHAREPOINT_DRIVE_ID }}
          SHAREPOINT_FOLDER_PATH: ${{ secrets.SHAREPOINT_FOLDER_PATH }}
        run: |
          python -m brighthr_time_review.main \
            --source csv \
            --input  "$INPUT" \
            --output data/output/brighthr_time_review_workbook.xlsx \
            --sharepoint

      # --- API run (manual workflow_dispatch with source=api) ---
      - name: Run BrightHR Time Review (API)
        if: env.RUN_SOURCE == 'api'
        env:
          BRIGHTHR_CLIENT_ID: ${{ secrets.BRIGHTHR_CLIENT_ID }}
          BRIGHTHR_CLIENT_SECRET: ${{ secrets.BRIGHTHR_CLIENT_SECRET }}
          BRIGHTHR_BASE_URL: ${{ secrets.BRIGHTHR_BASE_URL }}
          SHAREPOINT_TENANT_ID: ${{ secrets.SHAREPOINT_TENANT_ID }}
          SHAREPOINT_CLIENT_ID: ${{ secrets.SHAREPOINT_CLIENT_ID }}
          SHAREPOINT_CLIENT_SECRET: ${{ secrets.SHAREPOINT_CLIENT_SECRET }}
          SHAREPOINT_SITE_ID: ${{ secrets.SHAREPOINT_SITE_ID }}
          SHAREPOINT_DRIVE_ID: ${{ secrets.SHAREPOINT_DRIVE_ID }}
          SHAREPOINT_FOLDER_PATH: ${{ secrets.SHAREPOINT_FOLDER_PATH }}
        run: |
          python -m brighthr_time_review.main \
            --source api \
            --date-from "$DATE_FROM" \
            --date-to   "$DATE_TO" \
            --output data/output/brighthr_time_review_workbook.xlsx \
            --sharepoint

      # Artifact upload is kept only for the push trigger (sample/dev data).
      # Production and manual runs upload directly to SharePoint via --sharepoint,
      # so no artifact is needed there.  7-day retention is sufficient for dev
      # inspection before the sample file is iterated on again.
      - name: Upload workbook as artifact (sample data only)
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: brighthr-time-review-workbook
          path: data/output/brighthr_time_review_workbook.xlsx
          retention-days: 7

